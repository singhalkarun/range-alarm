<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      overflow: hidden;
    }

    .caption {
      color: #22d3ee;
      font-size: 48px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 40px;
      letter-spacing: -0.02em;
      max-width: 80%;
      line-height: 1.2;
    }

    .device-frame {
      position: relative;
      background: #1a1a2e;
      border-radius: 40px;
      padding: 12px;
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.08),
        0 25px 50px rgba(0,0,0,0.5),
        0 0 100px rgba(34,211,238,0.05);
    }

    .device-frame.tablet {
      border-radius: 28px;
      padding: 10px;
    }

    .screen {
      border-radius: 30px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .device-frame.tablet .screen {
      border-radius: 20px;
    }

    .screen img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Screen dimensions scaled to fill viewport nicely.
       Viewport is set to Play Store output size by Puppeteer.
       Caption takes ~15% of height, frame bezel adds ~24px,
       so screen height ≈ 70% of viewport height. */

    /* Phone (viewport: 1080x1920) */
    .device-frame.phone .screen {
      width: 68vw;
      height: 72vh;
    }

    /* 7-inch tablet (viewport: 1200x1920) */
    .device-frame.tablet-7 .screen {
      width: 72vw;
      height: 68vh;
    }

    /* 10-inch tablet (viewport: 1200x1920) */
    .device-frame.tablet-10 .screen {
      width: 74vw;
      height: 68vh;
    }
  </style>
</head>
<body>
  <div class="caption" id="caption"></div>
  <div class="device-frame" id="device-frame">
    <div class="screen">
      <img id="screenshot" src="" alt="App screenshot">
    </div>
  </div>

  <script>
    // These values are injected by Puppeteer via page.evaluate()
    // They are set before the screenshot is taken
  </script>
</body>
</html>
